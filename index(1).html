<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Stock Tracker - 50 Stocks</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 Weekly Stock Tracker</h1>
            <p>Track weekly price movements for your list of stocks (NSE/BSE)</p>
        </header>

        <div class="upload-section">
            <h3>Load Stocks from CSV</h3>
            <input type="file" id="csvFile" accept=".csv" />
            <button onclick="loadCSV()">Load CSV</button>
            <button onclick="downloadSampleCSV()">Download Sample CSV</button>
            <p id="status" class="status"></p>
        </div>

        <div class="controls">
            <button onclick="refreshAllData()" class="refresh-btn">🔄 Refresh All Data</button>
            <button onclick="clearAll()" class="clear-btn">Clear List</button>
            <span id="stockCount" class="count"></span>
        </div>

        <div class="table-container">
            <table id="stockTable">
                <thead>
                    <tr>
                        <th>Symbol</th>
                        <th>Company Name</th>
                        <th>Current Price (₹)</th>
                        <th>Weekly Change %</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="chartsContainer" class="charts-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
