<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Stock Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>📈 Weekly Stock Tracker (NSE)</h1>
    <p><strong>Version 1.4</strong> • Stock Name | TradingView Link | Comments</p>

    <div class="controls">
      <input type="text" id="addInput" placeholder="Symbol (RELIANCE.NS) or TradingView link" style="width: 380px; padding: 12px;">
      <input type="text" id="commentInput" placeholder="Comment (optional)" style="width: 280px; padding: 12px;">
      <button onclick="addStock()">➕ Add</button>
      <button onclick="refreshAllData()">🔄 Refresh</button>
      <button onclick="clearWatchlist()" class="clear-btn">🗑️ Clear All</button>
    </div>

    <table id="stockTable">
      <thead>
        <tr>
          <th>Stock Name</th>
          <th>TradingView Link</th>
          <th>Comments</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
