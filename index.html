<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Stock Tracker - NSE</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>📈 Weekly Stock Tracker (NSE)</h1>
    <p>Track your stocks • Weekly % Change • Click symbol to open TradingView</p>
    <p><strong>Version 1.3</strong> • Clear Watchlist</p>

    <div class="controls">
      <input type="text" id="addInput" placeholder="Enter symbol (e.g. RELIANCE.NS) or TradingView link" style="width: 380px; padding: 12px;">
      <button onclick="addStockFromInput()">➕ Add Stock</button>
      <button onclick="refreshAllData()">🔄 Refresh All</button>
      <button onclick="clearWatchlist()" class="clear-btn">🗑️ Clear Watchlist</button>
    </div>

    <table id="stockTable">
      <thead>
        <tr>
          <th>Symbol</th>
          <th>Current Price (₹)</th>
          <th>Weekly Change %</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
