<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Stock Tracker - NSE</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>📈 Weekly Stock Tracker (NSE)</h1>
    <p>Track up to 50+ stocks • Weekly % Change • <strong>Click symbol</strong> to open TradingView</p>
    <p><strong>Version 1.1</strong> • TradingView Integration</p>

    <div class="controls">
      <button onclick="downloadSampleCSV()">📥 Download Sample 50 Stocks CSV</button>
      <label class="upload-btn">
        📤 Load CSV File
        <input type="file" id="csvInput" accept=".csv" onchange="loadCSV(event)">
      </label>
      <button onclick="refreshAllData()">🔄 Refresh All Data</button>
    </div>

    <table id="stockTable">
      <thead>
        <tr>
          <th>Symbol</th>
          <th>Current Price (₹)</th>
          <th>Weekly Change %</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
